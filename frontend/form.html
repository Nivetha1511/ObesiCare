<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment Form - ObeseCare</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="form-page">
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <span class="logo-icon">🏥</span>
                <span class="logo-text">ObeseCare</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link" id="homeLink">Home</a></li>
                <li><button id="logoutBtn" class="nav-link nav-button">Logout</button></li>
            </ul>
        </div>
    </nav>

    <div class="form-container">
        <div class="form-header">
            <h1>Health Assessment</h1>
            <p>Please provide accurate information for better prediction</p>
        </div>

        <form id="assessmentForm" class="assessment-form">
            <!-- Personal Information Section -->
            <fieldset class="form-section">
                <legend>Personal Information</legend>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <select id="gender" name="Gender" required>
                            <option value="">Select Gender</option>
                            <option value="0">Female</option>
                            <option value="1">Male</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="age">Age (years)</label>
                        <input type="number" id="age" name="Age" placeholder="Enter age" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="height">Height (meters)</label>
                        <input type="number" id="height" name="Height" step="0.01" placeholder="e.g., 1.70" required>
                    </div>

                    <div class="form-group">
                        <label for="weight">Weight (kg)</label>
                        <input type="number" id="weight" name="Weight" step="0.1" placeholder="e.g., 70" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="familyHistory">Family History of Overweight</label>
                    <select id="familyHistory" name="family_history_with_overweight" required>
                        <option value="">Select Option</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>
            </fieldset>

            <!-- Nutrition Section -->
            <fieldset class="form-section">
                <legend>Nutrition & Eating Habits</legend>

                <div class="form-group">
                    <label for="favc">Frequent High Calorie Food Consumption (FAVC)</label>
                    <select id="favc" name="FAVC" required>
                        <option value="">Select Option</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="fcvc">Frequent Vegetable Consumption (FCVC)</label>
                        <input type="range" id="fcvc" name="FCVC" min="1" max="3" step="0.5" value="2">
                        <div class="range-labels">
                            <span>Never</span>
                            <span class="range-value" id="fcvcValue">2.0</span>
                            <span>Always</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="ncp">Number of Meals Per Day (NCP)</label>
                        <input type="range" id="ncp" name="NCP" min="1" max="4" step="0.5" value="2.5">
                        <div class="range-labels">
                            <span>1</span>
                            <span class="range-value" id="ncpValue">2.5</span>
                            <span>4+</span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="caec">Eating Between Meals (CAEC)</label>
                    <select id="caec" name="CAEC" required>
                        <option value="">Select Option</option>
                        <option value="0">Always</option>
                        <option value="1">Frequently</option>
                        <option value="2">Sometimes</option>
                        <option value="3">No</option>
                    </select>
                </div>
            </fieldset>

            <!-- Lifestyle Section -->
            <fieldset class="form-section">
                <legend>Lifestyle Habits</legend>

                <div class="form-row">
                    <div class="form-group">
                        <label for="smoke">Do You Smoke? (SMOKE)</label>
                        <select id="smoke" name="SMOKE" required>
                            <option value="">Select Option</option>
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="ch2o">Water Intake Liters Per Day (CH2O)</label>
                        <input type="range" id="ch2o" name="CH2O" min="1" max="3" step="0.5" value="2">
                        <div class="range-labels">
                            <span>1L</span>
                            <span class="range-value" id="ch2oValue">2.0</span>
                            <span>3L</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="scc">Monitoring Calorie Intake (SCC)</label>
                        <select id="scc" name="SCC" required>
                            <option value="">Select Option</option>
                            <option value="0">No</option>
                            <option value="1">Yes</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="faf">Physical Activity Frequency Hours (FAF)</label>
                        <input type="range" id="faf" name="FAF" min="0" max="3" step="0.5" value="1">
                        <div class="range-labels">
                            <span>None</span>
                            <span class="range-value" id="fafValue">1.0</span>
                            <span>3+ hrs</span>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="tue">Screen Time Hours Per Day (TUE)</label>
                        <input type="number" id="tue" name="TUE" step="0.1" placeholder="e.g., 1.5" required>
                    </div>

                    <div class="form-group">
                        <label for="calc">Alcohol Consumption (CALC)</label>
                        <select id="calc" name="CALC" required>
                            <option value="">Select Option</option>
                            <option value="0">Always</option>
                            <option value="1">Frequently</option>
                            <option value="2">Sometimes</option>
                            <option value="3">No</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- Transportation Section -->
            <fieldset class="form-section">
                <legend>Transportation</legend>

                <div class="form-group">
                    <label for="mtrans">Primary Transportation Mode (MTRANS)</label>
                    <select id="mtrans" name="MTRANS" required>
                        <option value="">Select Option</option>
                        <option value="0">Automobile (Car)</option>
                        <option value="1">Bike</option>
                        <option value="2">Motorbike</option>
                        <option value="3">Public Transport</option>
                        <option value="4">Walking</option>
                    </select>
                </div>
            </fieldset>

            <div class="form-actions">
                <button type="button" id="resetBtn" class="reset-button">Clear</button>
                <button type="submit" class="predict-button">Get Prediction</button>
            </div>
        </form>

        <div id="message" class="form-message"></div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const router = window.ObesiCareRouter;
        const homeLink = document.getElementById('homeLink');
        if (homeLink) {
            homeLink.href = router.page('index');
        }

        // Update range value displays
        document.getElementById('fcvc').addEventListener('input', (e) => {
            document.getElementById('fcvcValue').textContent = e.target.value;
        });
        document.getElementById('ncp').addEventListener('input', (e) => {
            document.getElementById('ncpValue').textContent = e.target.value;
        });
        document.getElementById('ch2o').addEventListener('input', (e) => {
            document.getElementById('ch2oValue').textContent = e.target.value;
        });
        document.getElementById('faf').addEventListener('input', (e) => {
            document.getElementById('fafValue').textContent = e.target.value;
        });

        // Check if user is logged in
        const username = localStorage.getItem('username');
        if (!username) {
            window.location.href = router.page('login');
        }

        // Logout button
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('username');
            window.location.href = router.page('index');
        });

        // Form submission
        const form = document.getElementById('assessmentForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            messageDiv.textContent = 'Processing your assessment...';
            messageDiv.className = 'form-message loading';

            // Collect form data
            const formData = new FormData(form);
            const data = {};
            
            formData.forEach((value, key) => {
                data[key] = Number(value);
            });

            try {
                const response = await fetch(router.api('/predict'), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    // Store result and redirect
                    localStorage.setItem('prediction', JSON.stringify(result));
                    messageDiv.textContent = '✓ Assessment complete! Redirecting...';
                    messageDiv.className = 'form-message success';
                    setTimeout(() => {
                        window.location.href = router.page('result');
                    }, 1500);
                } else {
                    messageDiv.textContent = 'Error: ' + result.message;
                    messageDiv.className = 'form-message error';
                }
            } catch (error) {
                messageDiv.textContent = 'Error: ' + error.message;
                messageDiv.className = 'form-message error';
            }
        });

        // Reset button
        document.getElementById('resetBtn').addEventListener('click', () => {
            form.reset();
            // Reset range displays
            document.getElementById('fcvcValue').textContent = '2';
            document.getElementById('ncpValue').textContent = '2.5';
            document.getElementById('ch2oValue').textContent = '2';
            document.getElementById('fafValue').textContent = '1';
            messageDiv.textContent = '';
            messageDiv.className = '';
        });
    </script>
</body>
</html>
